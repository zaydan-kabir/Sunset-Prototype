<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunset</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    font-family: Georgia, serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .stage {
    position: relative;
    width: min(440px, 80vmin);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* breathing rings — fade out as the gallop begins */
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    opacity: 0;
    animation: breathe 6s ease-in-out infinite, ringOut 1s ease-in 2.6s forwards;
  }
  .ring:nth-child(1) { animation-delay: 0s, 2.6s; }
  .ring:nth-child(2) { animation-delay: 1.5s, 2.6s; }
  .ring:nth-child(3) { animation-delay: 3.0s, 2.6s; }
  .ring:nth-child(4) { animation-delay: 4.5s, 2.6s; }

  @keyframes breathe {
    0%   { transform: scale(0.55); opacity: 0; border-color: rgba(255,255,255,0.45); }
    40%  { opacity: 0.5; }
    100% { transform: scale(1.35); opacity: 0; border-color: rgba(255,255,255,0.05); }
  }
  @keyframes ringOut { to { opacity: 0 !important; } }

  /* the framed badge — circle shrinks and fades, releasing the horse */
  .badge {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    animation: badgeOut 1.2s cubic-bezier(.6,.0,.7,.2) 2.6s forwards;
  }
  @keyframes badgeOut {
    0%   { clip-path: circle(50% at 50% 50%); opacity: 1; transform: scale(1); }
    60%  { clip-path: circle(50% at 50% 50%); opacity: 1; }
    100% { clip-path: circle(0% at 50% 50%); opacity: 0; transform: scale(0.6); }
  }

  .badge svg.bg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .logo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 22px rgba(255,255,255,0.18));
    animation: float 6s ease-in-out infinite, gallop 2.2s cubic-bezier(.4,.0,.2,1) 3.2s forwards;
    z-index: 5;
  }
  .logo svg { width: 100%; height: 100%; display: block; }

  @keyframes float {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.04) translateY(-4px); }
  }

  /* horse faces right — gallop off to the right with a small arc + bob */
  @keyframes gallop {
    0%   { transform: translate(0,0) scale(1) rotate(0); }
    15%  { transform: translate(20px,-10px) scale(1.02) rotate(-3deg); }
    35%  { transform: translate(120px,-4px) scale(1.04) rotate(-1deg); }
    60%  { transform: translate(360px,-18px) scale(1.0) rotate(2deg); }
    100% { transform: translate(140vw,-40px) scale(0.85) rotate(4deg); opacity: 0.0; }
  }

  /* hooves dust trail */
  .dust {
    position: absolute;
    left: 50%;
    top: 62%;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    opacity: 0;
    animation: dust 1.8s ease-out 3.4s forwards;
  }
  .dust:nth-of-type(2) { animation-delay: 3.55s; left: 48%; }
  .dust:nth-of-type(3) { animation-delay: 3.7s;  left: 46%; }
  .dust:nth-of-type(4) { animation-delay: 3.85s; left: 44%; }
  @keyframes dust {
    0%   { opacity: 0.0; transform: translate(0, 0) scale(0.4); }
    30%  { opacity: 0.6; }
    100% { opacity: 0;   transform: translate(-80px, -10px) scale(2.2); }
  }

  .hint {
    position: absolute;
    bottom: -56px;
    left: 0; right: 0;
    text-align: center;
    letter-spacing: 0.35em;
    font-size: 11px;
    color: #fff;
    opacity: 0;
    animation: hintIn 0.8s ease 0.4s forwards, hintOut 0.6s ease 2.8s forwards;
  }
  @keyframes hintIn  { to { opacity: 0.6; } }
  @keyframes hintOut { to { opacity: 0; } }

  /* fade the whole screen to white just before redirect */
  .flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    animation: flash 1.2s ease-in 4.6s forwards;
    z-index: 99;
  }
  @keyframes flash { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="badge">
      <svg class="bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="96" fill="#000"/>
        <circle cx="100" cy="100" r="92" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M30,140 Q100,128 170,142" stroke="#fff" stroke-width="1" fill="none" opacity="0.35"/>
      </svg>
    </div>

    <div class="logo" id="logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g fill="#fff" transform="translate(40,55)">
          <path d="M20,55
                   C20,42 32,34 48,34
                   C58,30 72,28 84,32
                   C92,22 100,18 108,22
                   C112,16 118,14 122,18
                   L126,12 L128,20
                   C132,22 132,28 128,32
                   C130,38 126,44 118,46
                   C116,52 110,56 104,54
                   L100,66 L96,80 L92,80 L94,66 L80,62
                   L74,80 L70,80 L72,62
                   L50,60 L46,80 L42,80 L44,58
                   L28,60 L24,80 L20,80 L22,58 Z"/>
          <path d="M108,22 C112,12 116,8 122,8 L120,18" stroke="#fff" stroke-width="1.2" fill="none" opacity="0.7"/>
          <path d="M112,26 C118,18 124,16 128,18" stroke="#fff" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="118" cy="24" r="0.9" fill="#000"/>
        </g>
      </svg>
    </div>

    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>

    <div class="hint">RIDING OFF…</div>
  </div>

  <div class="flash"></div>

<script>
  // soft neigh just before the gallop
  function neigh() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t0 = ctx.currentTime;
    const dur = 1.4;

    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(720, t0);
    osc.frequency.exponentialRampToValueAtTime(620, t0 + 0.15);
    osc.frequency.exponentialRampToValueAtTime(480, t0 + 0.55);
    osc.frequency.exponentialRampToValueAtTime(300, t0 + dur);

    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 22;
    lfoGain.gain.value = 35;
    lfo.connect(lfoGain).connect(osc.frequency);

    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 4;

    oscGain.gain.setValueAtTime(0, t0);
    oscGain.gain.linearRampToValueAtTime(0.18, t0 + 0.05);
    oscGain.gain.linearRampToValueAtTime(0.22, t0 + 0.4);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(bp).connect(oscGain).connect(ctx.destination);

    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const nFilt = ctx.createBiquadFilter();
    nFilt.type = 'highpass'; nFilt.frequency.value = 1200;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0, t0);
    nGain.gain.linearRampToValueAtTime(0.06, t0 + 0.1);
    nGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    noise.connect(nFilt).connect(nGain).connect(ctx.destination);

    osc.start(t0); lfo.start(t0); noise.start(t0);
    osc.stop(t0 + dur + 0.05);
    lfo.stop(t0 + dur + 0.05);
    noise.stop(t0 + dur + 0.05);
  }

  // play neigh as the badge starts to open
  window.addEventListener('load', () => {
    setTimeout(() => { try { neigh(); } catch(e){} }, 2400);
    // redirect once the flash finishes
    setTimeout(() => { window.location.href = 'https://sunsethq.com'; }, 5800);
  });

  // also let the user trigger it immediately
  document.addEventListener('click', () => {
    window.location.href = 'https://sunsethq.com';
  });
</script>
</body>
</html>
