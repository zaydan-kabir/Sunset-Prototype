<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunset</title>
<style>
  :root {
    --bg: #f5f0e6;
    --ink: #1a2330;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Didot', 'Bodoni 72', 'Georgia', serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(26,35,48,0.10) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .stage {
    position: relative;
    width: min(720px, 86vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
  }

  .rule {
    position: absolute;
    left: 50%;
    height: 1px;
    background: var(--ink);
    width: 0;
    transform: translateX(-50%);
    animation: ruleDraw 1.6s cubic-bezier(.6,.0,.2,1) 0.3s forwards,
               ruleOut  0.9s cubic-bezier(.6,.0,.7,.2) 4.6s forwards;
  }
  .rule.top    { top: -36px; }
  .rule.bottom { bottom: -36px; }
  @keyframes ruleDraw { to { width: 100%; } }
  @keyframes ruleOut  { to { opacity: 0; transform: translateX(-50%) scaleY(0); } }

  .tick {
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--ink);
    opacity: 0;
    animation: tickIn 0.6s ease 1.6s forwards, tickOut 0.6s ease 4.6s forwards;
  }
  .tick.tl { top: -42px; left: -10px;  border-right: 0; border-bottom: 0; }
  .tick.tr { top: -42px; right: -10px; border-left: 0;  border-bottom: 0; }
  .tick.bl { bottom: -42px; left: -10px;  border-right: 0; border-top: 0; }
  .tick.br { bottom: -42px; right: -10px; border-left: 0;  border-top: 0; }
  @keyframes tickIn  { to { opacity: 0.55; } }
  @keyframes tickOut { to { opacity: 0; } }

  .logo {
    width: 100%;
    opacity: 0;
    animation: logoIn  1.4s ease 0.9s forwards,
               logoOut 1.2s ease 4.8s forwards;
  }
  .logo img { width: 100%; height: auto; display: block; }
  @keyframes logoIn  { to { opacity: 1; } }
  @keyframes logoOut { to { opacity: 0; } }

  .veil {
    position: fixed; inset: 0;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    animation: veil 1.4s ease-in-out 5.0s forwards;
    z-index: 10;
  }
  @keyframes veil { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="stage">
    <span class="rule top"></span>
    <span class="tick tl"></span>
    <span class="tick tr"></span>

    <div class="logo">
      <img src="Sunset-logo.png" alt="Sunset" />
    </div>

    <span class="rule bottom"></span>
    <span class="tick bl"></span>
    <span class="tick br"></span>
  </div>

  <div class="veil"></div>

<script>
  setTimeout(() => { window.location.href = 'home.html'; }, 6500);
  document.addEventListener('click', () => { window.location.href = 'home.html'; });
</script>
</body>
</html>
