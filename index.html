<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunset</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    font-family: Georgia, serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    filter: grayscale(1) contrast(1.05);
  }

  .stage {
    position: relative;
    width: min(440px, 80vmin);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* concentric breathing rings */
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    opacity: 0;
    animation: breathe 6s ease-in-out infinite, ringOut 1s ease-in 2.6s forwards;
  }
  .ring:nth-child(1) { animation-delay: 0s, 2.6s; }
  .ring:nth-child(2) { animation-delay: 1.5s, 2.6s; }
  .ring:nth-child(3) { animation-delay: 3.0s, 2.6s; }
  .ring:nth-child(4) { animation-delay: 4.5s, 2.6s; }

  @keyframes breathe {
    0%   { transform: scale(0.55); opacity: 0; border-color: rgba(255,255,255,0.45); }
    40%  { opacity: 0.5; }
    100% { transform: scale(1.35); opacity: 0; border-color: rgba(255,255,255,0.05); }
  }
  @keyframes ringOut { to { opacity: 0 !important; } }

  /* the white outlined circle that frames the badge — fades out when horse bursts free */
  .frame {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 0 30px rgba(255,255,255,0.12) inset;
    animation: frameOut 1.0s cubic-bezier(.6,.0,.7,.2) 2.8s forwards;
    z-index: 6;
  }
  @keyframes frameOut {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.25); }
  }

  /* the actual logo image, clipped to a circle so it blends with the black page */
  .logo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: url('sunsethq_logo.jpeg') center/120% no-repeat;
    filter: drop-shadow(0 0 22px rgba(255,255,255,0.18));
    animation: float 6s ease-in-out infinite, gallop 2.4s cubic-bezier(.4,.0,.2,1) 3.0s forwards;
    z-index: 5;
  }

  @keyframes float {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.03) translateY(-4px); }
  }

  /* horse faces right — gallop off to the right with a slight arc + bob */
  @keyframes gallop {
    0%   { transform: translate(0,0) scale(1) rotate(0); }
    12%  { transform: translate(18px,-12px) scale(1.03) rotate(-3deg); }
    30%  { transform: translate(120px,-6px)  scale(1.05) rotate(-1deg); }
    55%  { transform: translate(380px,-22px) scale(1.0)  rotate(2deg); }
    100% { transform: translate(150vw,-40px) scale(0.8)  rotate(5deg); opacity: 0; }
  }

  /* dust puffs left behind */
  .dust {
    position: absolute;
    left: 50%;
    top: 62%;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    opacity: 0;
    animation: dust 1.8s ease-out 3.2s forwards;
    z-index: 4;
  }
  .dust:nth-of-type(2) { animation-delay: 3.4s;  left: 48%; }
  .dust:nth-of-type(3) { animation-delay: 3.6s;  left: 46%; }
  .dust:nth-of-type(4) { animation-delay: 3.8s;  left: 44%; }
  @keyframes dust {
    0%   { opacity: 0;   transform: translate(0, 0) scale(0.4); }
    30%  { opacity: 0.6; }
    100% { opacity: 0;   transform: translate(-90px, -12px) scale(2.4); }
  }

  .hint {
    position: absolute;
    bottom: -56px;
    left: 0; right: 0;
    text-align: center;
    letter-spacing: 0.35em;
    font-size: 11px;
    color: #fff;
    opacity: 0;
    animation: hintIn 0.8s ease 0.4s forwards, hintOut 0.6s ease 2.8s forwards;
  }
  @keyframes hintIn  { to { opacity: 0.55; } }
  @keyframes hintOut { to { opacity: 0; } }

  .flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    animation: flash 1.2s ease-in 4.6s forwards;
    z-index: 99;
  }
  @keyframes flash { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="logo" id="logo"></div>
    <div class="frame"></div>

    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>

    <div class="hint">RIDING OFF…</div>
  </div>

  <div class="flash"></div>

<script>
  function neigh() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t0 = ctx.currentTime;
    const dur = 1.4;

    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(720, t0);
    osc.frequency.exponentialRampToValueAtTime(620, t0 + 0.15);
    osc.frequency.exponentialRampToValueAtTime(480, t0 + 0.55);
    osc.frequency.exponentialRampToValueAtTime(300, t0 + dur);

    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 22;
    lfoGain.gain.value = 35;
    lfo.connect(lfoGain).connect(osc.frequency);

    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 4;

    oscGain.gain.setValueAtTime(0, t0);
    oscGain.gain.linearRampToValueAtTime(0.18, t0 + 0.05);
    oscGain.gain.linearRampToValueAtTime(0.22, t0 + 0.4);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(bp).connect(oscGain).connect(ctx.destination);

    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const nFilt = ctx.createBiquadFilter();
    nFilt.type = 'highpass'; nFilt.frequency.value = 1200;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0, t0);
    nGain.gain.linearRampToValueAtTime(0.06, t0 + 0.1);
    nGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    noise.connect(nFilt).connect(nGain).connect(ctx.destination);

    osc.start(t0); lfo.start(t0); noise.start(t0);
    osc.stop(t0 + dur + 0.05);
    lfo.stop(t0 + dur + 0.05);
    noise.stop(t0 + dur + 0.05);
  }

  window.addEventListener('load', () => {
    setTimeout(() => { try { neigh(); } catch(e){} }, 2400);
    setTimeout(() => { window.location.href = 'https://sunsethq.com'; }, 5800);
  });

  document.addEventListener('click', () => {
    window.location.href = 'https://sunsethq.com';
  });
</script>
</body>
</html>
